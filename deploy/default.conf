upstream backend_upstream {
    server backend:5000;
}

upstream admin_upstream {
    server admin:80;
}

upstream frontend_upstream {
    server frontend:80;
}

# Redirect HTTP to HTTPS (once SSL is set up)
server {
    listen 80 default_server;
    server_name africavet.com www.africavet.com manager.africavet.com 83.228.241.6;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # For initial setup without SSL, serve directly
    # Once SSL certs are obtained, uncomment the redirect below:
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # --- Temporary HTTP serving (remove after SSL setup) ---

    # API proxy (all domains)
    location /api/ {
        proxy_pass http://backend_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300;
    }

    # Uploads
    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Admin panel via path: http://83.228.241.6/manager/
    # Temporary access while waiting for manager.africavet.com DNS
    location = /manager {
        return 301 /manager/;
    }
    location /manager/ {
        proxy_pass http://admin_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Default: route based on Host header
    location / {
        # Manager subdomain → admin panel
        set $upstream frontend_upstream;
        if ($host = "manager.africavet.com") {
            set $upstream admin_upstream;
        }
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

