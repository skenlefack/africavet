# Docker Compose - Production (pre-built images)
# Images are built locally and loaded on the server via deploy.sh
services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: africavet-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: --default-authentication-plugin=mysql_native_password --innodb-buffer-pool-size=128M --max-connections=50
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - africavet-network

  # Backend API (Express.js)
  backend:
    image: africavet-backend:latest
    container_name: africavet-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: http://africavet.com,https://africavet.com,http://www.africavet.com,https://www.africavet.com,http://manager.africavet.com,https://manager.africavet.com,http://83.228.241.6,http://83.228.241.6:8080
      FRONTEND_URL: http://www.africavet.com
      ADMIN_URL: http://manager.africavet.com
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@africavet.com}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - africavet-network

  # Admin Panel (React - admin-next)
  # Accessible via http://83.228.241.6:8080 (accès provisoire par IP)
  admin:
    image: africavet-admin:latest
    container_name: africavet-admin
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - africavet-network

  # Frontend Public Site (Vite + React)
  frontend:
    image: africavet-frontend:latest
    container_name: africavet-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - africavet-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: africavet-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/var/www/uploads:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - frontend
      - admin
      - backend
    networks:
      - africavet-network

  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot
    container_name: africavet-certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - africavet-network

networks:
  africavet-network:
    driver: bridge

volumes:
  mysql_data:
  uploads_data:
  certbot_conf:
  certbot_www:
